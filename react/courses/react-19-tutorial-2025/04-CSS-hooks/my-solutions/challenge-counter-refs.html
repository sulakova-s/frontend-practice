<!doctype html>
<html>
  <head>
    <title>Chatbot</title>
    <!-- 4i: style counter with flexbox centering + full height -->
    <style>
      body {
        font-family: Arial;
        margin: 0;
      }

      .buttons-container {
        display: flex;
        height: 100vh;
        background-color: rgb(222, 222, 222);
        align-items: center;
        justify-content: center;
        gap: 10px;
      }

      button {
        background-color: rgb(25, 135, 84);
        color: white;
        border: none;
        padding: 12px 18px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="js-container"></div>
    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      function App() {
        // 4h: counter with useRef + setInterval
        const [counter, setCounter] = React.useState(0);
        // Auto Click triggers real button clicks via ref
        const [autoClick, setAutoClick] = React.useState(false);
        const buttonElem = React.useRef(null);

        React.useEffect(() => {
          if (autoClick) {
            const intervalId = setInterval(() => {
              buttonElem.current.click();
            }, 1000);
            return () => clearInterval(intervalId);
          }
        }, [autoClick]);

        return (
          <div className="buttons-container">
            <button
              ref={buttonElem}
              onClick={() => {
                setCounter(counter + 1);
              }}
            >
              Clicked {counter} times
            </button>
            <button
              onClick={() => {
                setCounter(0);
              }}
            >
              Reset
            </button>
            <button
              onClick={() => {
                setAutoClick(!autoClick);
              }}
            >
              Auto Click ({autoClick ? "ON" : "OFF"})
            </button>
          </div>
        );
      }

      const container = document.querySelector(".js-container");
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
