<!doctype html>
<html>
  <head>
    <title>ON/OFF button</title>
    <!--  
      4a: create green button
      4c: when button "OFF" make it red 
    -->
    <style>
      button {
        color: white;
        border: none;
        border-radius: 5px;
        padding: 12px 16px;
      }
      .button-on {
        background-color: rgb(25, 135, 84);
      }

      .button-off {
        background-color: rgb(220, 53, 69);
      }
    </style>
  </head>
  <body>
    <div class="js-container"></div>
    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      function App() {
        // 4b: switch between ON/OFF by Click
        const [isButtonOn, setIsButtonOn] = React.useState(true);

        return (
          <button
            className={isButtonOn ? "button-on" : "button-off"}
            onClick={() => setIsButtonOn(!isButtonOn)}
          >
            {isButtonOn ? "ON" : "OFF"}
          </button>
        );
      }

      const container = document.querySelector(".js-container");
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
