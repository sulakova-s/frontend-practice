<!doctype html>
<html>
  <head>
    <title>Habit Tracker</title>
    <style type="text/css">
      table {
        margin-top: 25px;
        border-collapse: separate;
        border-spacing: 0;
        width: 100%;
        border-radius: 12px;
        border: 0.7px solid #eee;
        overflow: hidden;
      }
      th {
        padding: 16px 12px;
        font-weight: 600;
        text-align: left;
        border: 0.7px solid #eee;
      }

      tr {
        height: 60px;
      }

      td {
        border: 0.7px solid #eee;
        color: #1e293b;
      }

      th.today {
        background-color: rgb(127, 171, 82, 20%);
        font-weight: bold;
      }

      td:first-child {
        padding: 8px 12px;
        height: 60px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      td:not(:first-child) {
        width: 60px;
        height: 60px;
        padding: 0;
      }

      td.completed {
        background-color: #7fab52;
      }

      td.half {
        background: linear-gradient(-45deg, #7fab52 50%, transparent 50%);
      }

      td button {
        background: none;
        border: none;
        cursor: pointer;
        padding: 6px;
        border-radius: 8px;
        font-size: 1.1rem;
      }

      td button:hover {
        background-color: #f1f5f9;
      }

      .add-button {
        padding: 13px 20px;
        margin-left: 10px;
        border: none;
        border-radius: 10px;
        font-size: 15px;
        cursor: pointer;
      }

      .help-button {
        padding: 13px 20px;
        margin-left: 10px;
        margin-top: 10px;

        border: none;
        border-radius: 10px;
        font-size: 15px;
        cursor: pointer;
      }

      .habbit-input {
        padding: 12px 15px;
        border-radius: 10px;
        border-width: 1px;
        font-size: 15px;

        flex-grow: 1;
      }

      .app-container {
        max-width: 600px;
        margin-left: auto;
        margin-right: auto;
      }
    </style>
  </head>
  <body>
    <div class="js-container"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>

    <script type="text/babel">
      function getCurrentWeek() {
        const currentWeek = [];
        const monday = moment().startOf("isoWeek");

        for (let i = 0; i < 7; i++) {
          const day = monday.clone().add(i, "days");
          currentWeek.push(day.format("YYYY-MM-DD"));
        }

        return currentWeek;
      }

      function WeekHeader({ currentWeek }) {
        const today = moment().format("YYYY-MM-DD");

        return (
          <tr>
            <th>Привычка</th>
            {currentWeek.map((date) => (
              <th key={date} className={date === today ? "today" : ""}>
                {moment(date).format("dd, DD")}
              </th>
            ))}
          </tr>
        );
      }

      function HabitRow({ habit, weekDays, onToggleDay, onEdit, onDelete }) {
        const statusClasses = {
          true: "completed",
          half: "half",
          false: "",
          undefined: "",
        };

        return (
          <tr>
            <td>
              {habit.name}
              <button onClick={() => onEdit(habit.id)} title="Редактировать">
                ✏️
              </button>
              <button onClick={() => onDelete(habit.id)} title="Удалить">
                🗑️
              </button>
            </td>
            {weekDays.map((day, index) => {
              const dayRecord = habit.history.find(
                (record) => record.date === day,
              );
              return (
                <td
                  key={index}
                  onClick={() => onToggleDay(habit.id, day)}
                  style={{ cursor: "pointer" }}
                  className={statusClasses[dayRecord?.completed]}
                >
                  {}
                </td>
              );
            })}
          </tr>
        );
      }

      function CreateTable({ habits, setHabits }) {
        const currentWeek = getCurrentWeek();

        function handleToggleDay(habitId, date) {
          const updatedHabits = habits.map((habit) => {
            if (habit.id !== habitId) return habit;

            if (moment(date).isAfter(moment(), "day")) return habit;

            const existingRecord = habit.history.find(
              (record) => record.date === date,
            );

            if (!existingRecord) {
              return {
                ...habit,
                history: [...habit.history, { date, completed: true }],
              };
            }

            let newCompleted;
            if (existingRecord.completed === true) {
              newCompleted = "half";
            } else if (existingRecord.completed === "half") {
              newCompleted = false;
            } else {
              newCompleted = true;
            }

            return {
              ...habit,
              history: habit.history.map((record) =>
                record.date === date
                  ? { ...record, completed: newCompleted }
                  : record,
              ),
            };
          });

          setHabits(updatedHabits);
        }

        function handleEdit(habitId) {
          const selectedHabit = habits.find((habit) => habit.id === habitId);
          const newName = prompt("New name", selectedHabit.name);

          if (newName && newName.trim()) {
            const updatedHabits = habits.map((habit) => {
              if (habit.id === habitId) {
                return { ...habit, name: newName.trim() };
              }
              return habit;
            });

            setHabits(updatedHabits);
          }
        }

        function handleDelete(habitId) {
          if (window.confirm("Точно удалить эту привычку?")) {
            const updatedHabits = habits.filter(
              (habit) => habit.id !== habitId,
            );

            setHabits(updatedHabits);
          }
        }

        return (
          <table>
            <thead>
              <WeekHeader currentWeek={currentWeek} />
            </thead>
            <tbody>
              {habits.map((habit) => (
                <HabitRow
                  key={habit.id}
                  habit={habit}
                  weekDays={currentWeek}
                  onToggleDay={handleToggleDay}
                  onEdit={handleEdit}
                  onDelete={handleDelete}
                />
              ))}
            </tbody>
          </table>
        );
      }

      function createNewHabit(name) {
        return {
          id: crypto.randomUUID(),
          name: name,
          history: [],
        };
      }
      function StatsBar({ habits }) {
        let totalScore = 0; // сумма всех очков (1 за полную, 0.5 за половинку)
        let totalPossible = 0; // максимально возможное количество очков
        let bestHabit = "";
        let worstHabit = "";

        const habitStats = [];
        const now = moment().endOf("day");

        habits.forEach((habit) => {
          let habitScore = 0;
          let habitPossible = 0;

          habit.history.forEach((record) => {
            if (moment(record.date).isSameOrBefore(now)) {
              habitPossible++;
              totalPossible++;

              if (record.completed === true) {
                habitScore += 1;
                totalScore += 1;
              } else if (record.completed === "half") {
                habitScore += 0.5;
                totalScore += 0.5;
              }
              // false или undefined = 0 очков
            }
          });

          const percentage =
            habitPossible > 0 ? (habitScore / habitPossible) * 100 : 0;

          habitStats.push({
            name: habit.name,
            score: habitScore,
            possible: habitPossible,
            percentage: percentage,
          });
        });

        // Поиск лучшей и худшей привычки
        if (habitStats.length > 0) {
          const maxPercentage = Math.max(
            ...habitStats.map((h) => h.percentage),
          );
          const minPercentage = Math.min(
            ...habitStats.map((h) => h.percentage),
          );

          const bestHabits = habitStats.filter(
            (h) => h.percentage === maxPercentage,
          );
          const worstHabits = habitStats.filter(
            (h) => h.percentage === minPercentage,
          );

          if (maxPercentage === 0) {
            bestHabit = "-";
            worstHabit = habitStats.map((h) => h.name).join(", ") + " (0%)";
          } else if (maxPercentage === minPercentage) {
            bestHabit =
              habitStats.map((h) => h.name).join(", ") +
              ` (${maxPercentage.toFixed(1)}%)`;
            worstHabit = "-";
          } else {
            bestHabit =
              bestHabits.length === 1
                ? `${bestHabits[0].name} (${maxPercentage.toFixed(1)}%)`
                : bestHabits.map((h) => h.name).join(", ") +
                  ` (${maxPercentage.toFixed(1)}%)`;

            worstHabit =
              worstHabits.length === 1
                ? `${worstHabits[0].name} (${minPercentage.toFixed(1)}%)`
                : worstHabits.map((h) => h.name).join(", ") +
                  ` (${minPercentage.toFixed(1)}%)`;
          }
        }

        const overallPercentage =
          totalPossible > 0
            ? Math.round((totalScore / totalPossible) * 100)
            : 0;

        return (
          <>
            <h3>Данные за неделю</h3>
            <p>Общий процент выполнения: {overallPercentage}%</p>
            <p>Лучшая привычка: {bestHabit}</p>
            <p>Худшая привычка: {worstHabit}</p>
          </>
        );
      }
      function SettingsModal({
        showSettings,
        deleteAllHabits,
        showStats,
        setshowStats,
      }) {
        return (
          <>
            {showSettings && (
              <div>
                <button onClick={deleteAllHabits} className="help-button">
                  🗑️ Сбросить все привычки
                </button>
                <button
                  onClick={() => setshowStats(!showStats)}
                  className="help-button"
                >
                  📊 Показать статистику
                </button>
              </div>
            )}
          </>
        );
      }

      function HabitPageHeader({ habits, setHabits }) {
        const inputRef = React.useRef();
        const [showSettings, setShowSettings] = React.useState(false);
        const [showStats, setshowStats] = React.useState(false);

        function AddHabit() {
          const name = inputRef.current.value;

          if (name && name.trim()) {
            setHabits([...habits, createNewHabit(name)]);
            inputRef.current.value = "";
          } else {
            alert("Введите название привычки!");
          }
        }

        function DeleteAllHabits() {
          if (
            habits.length > 0 &&
            window.confirm("Точно удалить все привычки?")
          ) {
            setHabits([]);
          }
        }

        return (
          <div>
            <h1>Мой трекер привычек</h1>

            <input
              ref={inputRef}
              placeholder="Добавить новую привычку.."
              size="45"
              className="habbit-input"
            />

            <button onClick={() => AddHabit()} className="add-button">
              Добавить
            </button>
            <button
              onClick={() => setShowSettings(!showSettings)}
              className="add-button"
            >
              ⚙️
            </button>

            <SettingsModal
              showSettings={showSettings}
              deleteAllHabits={DeleteAllHabits}
              showStats={showStats}
              setshowStats={setshowStats}
            />

            {showStats && <StatsBar habits={habits} />}
          </div>
        );
      }

      function HabitProgressTable({ habits, setHabits }) {
        return <CreateTable habits={habits} setHabits={setHabits} />;
      }

      function HabitDashboard() {
        const [habits, setHabits] = React.useState(() => {
          const saved = localStorage.getItem("habits");
          return saved ? JSON.parse(saved) : [];
        });

        React.useEffect(() => {
          localStorage.setItem("habits", JSON.stringify(habits));
        }, [habits]);

        return (
          <>
            <HabitPageHeader habits={habits} setHabits={setHabits} />
            <HabitProgressTable habits={habits} setHabits={setHabits} />
          </>
        );
      }

      function App() {
        return (
          <div className="app-container">
            <HabitDashboard />
          </div>
        );
      }

      const container = document.querySelector(".js-container");
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
